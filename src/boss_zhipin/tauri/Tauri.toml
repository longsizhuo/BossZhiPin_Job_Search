"$schema" = "https://schema.tauri.app/config/2"
productName = "BOSS Zhipin Helper"
version = "0.4.1"
identifier = "com.longsizhuo.boss-zhipin"

[build]
# 相对本文件所在目录（__init__.py 的 SRC_TAURI_DIR）解析。
# tauri-ui/vite.config.ts 的 build.outDir 必须构建到同一个目录。
frontendDist = "./frontend"

[app]
withGlobalTauri = true

[[app.windows]]
title = "BOSS Zhipin Helper"
label = "main"
width = 1000
height = 720
minWidth = 600
minHeight = 400
