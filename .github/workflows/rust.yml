name: Rust (src-tauri)

# 只在 src-tauri 变更时跑——Tauri 的 Linux 编译依赖（webkit2gtk 等）装起来
# 不便宜，没必要每个 Python PR 都付这个钱。
on:
  push:
    branches: [master]
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [master]
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"

concurrency:
  group: rust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Tauri 的 Linux 系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: 安装 Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 只 cargo check 不 build bundle——standalone bundle 需要 pyembed +
      # PYO3_PYTHON，CI 里组装太重；这里只拦"Rust 代码编译不过"这类回归。
      # 注：bin target 需要 pytauri/standalone feature + libpython 链接，
      # check lib target 就够覆盖 ext_mod / generate_context 的编译正确性。
      - name: cargo check（lib）
        working-directory: src-tauri
        run: cargo check --lib
