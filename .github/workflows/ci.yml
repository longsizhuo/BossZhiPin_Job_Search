name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 同一分支并行 push 时取消旧 run，省 CI 配额
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # commit message 或 PR title 带 [skip ci] 的跳过整个 job。
    # 注：``github.event.head_commit.message`` 只在 push 事件里存在；
    # pull_request 事件下 head_commit 是 null，contains(null, ...) 返回 false，
    # 自动 fall through 到检查 PR title。
    if: |
      !contains(github.event.head_commit.message, '[skip ci]')
      && !contains(github.event.pull_request.title, '[skip ci]')
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: 安装 Python 3.13
        run: uv python install 3.13

      - name: 安装依赖（frozen lockfile）
        run: uv sync --frozen

      - name: Smoke import check
        # 没有真测试也能拦下"改名 / 移文件 / import 烂掉"那一类回归。
        # 每多一个核心模块就往这里加一行。
        run: |
          # Phase D-pre 后：业务代码全部进 boss_zhipin/，根目录 main.py 仅
          # 是向后兼容 shim。CI 同时校验两侧：(1) 包导入，(2) main.py shim 能 import。
          uv run python -c "import main"
          uv run python -c "import boss_zhipin"
          uv run python -c "from boss_zhipin.providers import PROVIDER_ENV_KEYS, PROVIDER_SIGNUP, PROVIDER_LABELS, detect_providers"
          uv run python -c "from boss_zhipin.cli import _cli_main, detect_providers, pick_provider, run_provider, RECOMMEND_URL, PROVIDER_ENV_KEYS"
          uv run python -c "from boss_zhipin.paths import is_standalone, app_data_dir, ensure_app_data_cwd, APP_IDENTIFIER"
          uv run python -c "from boss_zhipin.audit import validate_letter, log_attempt"
          uv run python -c "from boss_zhipin.audit.telemetry import record_llm_call, telemetry_summary, estimate_cost_cny"
          uv run python -c "from boss_zhipin.utils.retry import retry_with_backoff"
          uv run python -c "from boss_zhipin.vectorization import VectorStore, embed_resume, text_hash, split_text"
          uv run python -c "from boss_zhipin.models.llm import PROVIDERS, generate_letter, _build_client"
          uv run python -c "from boss_zhipin.models.openai_assistant import create_assistant, OPENAI_API_KEY"
          uv run python -c "from boss_zhipin.models.prompts import assistant_instructions"
          uv run python -c "from boss_zhipin.models.job_matcher import should_apply, keyword_match, llm_match_score, extract_keywords_from_text, extract_resume_text"
          uv run python -c "from boss_zhipin.website_oper.finding_jobs import open_browser_with_options, log_in, get_tab, send_chat_message, shutdown"
          uv run python -c "from boss_zhipin.website_oper.write_response import send_job_descriptions_to_chat, chat"
          uv run python -c "from scripts.dump_boss_page import PROBE_JS, TARGET_URL, main"
          uv run python -c "from boss_zhipin.gui.events import ProgressEvent, EventKind, emit, set_emit_callback"
          uv run python -c "from boss_zhipin.gui.runner import start_run, stop_run, is_running, get_task, reset"
          uv run python -c "from boss_zhipin.gui.log_bridge import CallbackHandler, install, uninstall"
          uv run python -c "from boss_zhipin.gui.env_io import read_env, write_env, field_meta, KNOWN_KEYS"
          uv run python -c "from boss_zhipin.gui.resume_io import store_resume, current_resume, DEFAULT_RESUME_PATH"
          uv run python -c "from boss_zhipin.gui.history import read_letters"
          uv run python -c "from boss_zhipin.gui.updates import check_latest_release, is_newer, current_version, REPO"
          uv run python -c "from boss_zhipin.gui.provider_config import read_provider_config, write_provider_config"

      - name: 跑 pytest
        run: uv run pytest tests/ -v --tb=short
        env:
          # 单测不需要真凭据，给一个假值避免下游意外去读真的 .env
          DEEPSEEK_API_KEY: test-fake-key
          BOSS_RETRY_BASE_DELAY: "0.01"  # 加速 retry 测试
          BOSS_RETRY_MAX_DELAY: "0.05"

  no-leak:
    # 防止 .env / assistant.json / chrome_profile/* 这类敏感产物意外提交
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查仓库里没意外提交敏感文件
        run: |
          for f in .env assistant.json; do
            if git ls-files | grep -qE "^${f}\$"; then
              echo "❌ 仓库里追踪了不该提交的文件：${f}"
              exit 1
            fi
          done
          if git ls-files | grep -qE "^chrome_profile/|^vectorstores/|^logs/"; then
            echo "❌ 仓库里追踪了 chrome_profile/ vectorstores/ logs/ 之一，应该都在 .gitignore"
            exit 1
          fi
          echo "✅ 敏感产物未被追踪"
